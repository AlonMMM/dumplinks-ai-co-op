name: Test Reminder

on:
  pull_request:
    branches: ['**']

jobs:
  check-tests:
    name: Check for Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          LOGIC_CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep -E '^(backend|frontend)/src/.*\.(ts|tsx)$' \
            | grep -vE '\.(spec|test)\.(ts|tsx)$' \
            | grep -vE '/(dto|schemas|types|constants)/' \
            | wc -l | tr -d ' ')

          TESTS_CHANGED=$(git diff --name-only $BASE $HEAD \
            | grep -E '\.(spec|test)\.(ts|tsx)$' \
            | wc -l | tr -d ' ')

          echo "logic_changed=$LOGIC_CHANGED" >> $GITHUB_OUTPUT
          echo "tests_changed=$TESTS_CHANGED" >> $GITHUB_OUTPUT

      - name: Warn if no tests added
        if: steps.changed.outputs.logic_changed != '0' && steps.changed.outputs.tests_changed == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('⚠️ No tests detected')
            );

            const body = `⚠️ **No tests detected**\n\nThis PR changes business logic but doesn't include any test files (\`.spec.ts\` / \`.test.ts\`).\n\nPlease consider adding tests, or leave a comment explaining why tests aren't needed here.`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
