<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DumpLinks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              gray: {
                700: '#475569',
                750: '#3b485d',
                800: '#252f45',
                850: '#1f293a',
                900: '#1a2333',
                950: '#0f172a',
              },
              primary: {
                '50': '#fdf4ff',
                '100': '#fae8ff',
                '200': '#f5d0fe',
                '300': '#f0abfc',
                '400': '#e879f9',
                '500': '#d946ef',
                '600': '#c026d3',
                '700': '#a21caf',
                '800': '#86198f',
                '900': '#701a75',
                '950': '#4a044e',
              },
              accent: {
                yellow: '#FFD166',
                green: '#10B981',
                purple: '#8B5CF6',
                blue: '#3B82F6',
              }
            },
            animation: {
              'blob': 'blob 7s infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #252f45; border-radius: 5px; border: 2px solid #1a2333; }
      ::-webkit-scrollbar-thumb:hover { background: #3b485d; }
      * { scrollbar-width: thin; scrollbar-color: #252f45 transparent; }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 antialiased selection:bg-primary-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
